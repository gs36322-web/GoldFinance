<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GoldFinance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-[#0F0F0F] flex items-center justify-center min-h-screen px-4">

  <div class="bg-[#1A1A1A] p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-sm border border-[#2A2A2A]">

    <h1 class="text-white text-2xl font-semibold mb-6 text-center">
      Gold<span class="text-[#D4AF37]">Finance</span>
    </h1>

    <form id="loginForm" class="space-y-4">
      <input 
        type="email" 
        placeholder="Seu email"
        class="w-full p-3 rounded-lg bg-black text-white border border-[#2A2A2A] focus:outline-none focus:border-[#D4AF37]"
        required
      />

      <input 
        type="password" 
        placeholder="Sua senha"
        class="w-full p-3 rounded-lg bg-black text-white border border-[#2A2A2A] focus:outline-none focus:border-[#D4AF37]"
        required
      />

      <button 
        type="submit"
        class="w-full bg-[#D4AF37] text-black font-semibold p-3 rounded-lg hover:opacity-90 transition"
      >
        Entrar
      </button>

      <p class="text-center text-gray-400 mt-4">
        Não tem conta?
        <a href="register.html" class="text-[#D4AF37]">Criar conta</a>
      </p>
    </form>

  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/modules/auth.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
